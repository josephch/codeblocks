name: Build AppImage

on:
  workflow_dispatch:

jobs:
  build-appimage:
    runs-on: ubuntu-22.04

    env:
      APPDIR: AppDir
      APPVERSION: ${{ github.head_ref || github.ref_name }}
      CREATE_APPDIR_TGZ: false

    steps:
    - name: Checkout Code::Blocks
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update

        sudo apt-get install -y \
          build-essential \
          autoconf \
          automake \
          libtool \
          pkg-config \
          git \
          zip \
          unzip \
          gettext \
          libgtk-3-dev \
          libboost-dev \
          libboost-system-dev \
          libboost-filesystem-dev \
          libzstd-dev \
          wget

    - name: Checkout wxWidgets
      run: |
        git clone --depth=1 --branch v3.2.10 \
          https://github.com/wxWidgets/wxWidgets.git
        cd wxWidgets
        git submodule update --init
        git status

    - name: Build wxWidgets
      run: |
        export WX_PREFIX="${PWD}/${APPDIR}"
        cd wxWidgets

        mkdir buildgtk
        cd buildgtk

        ../configure \
          --prefix=${WX_PREFIX} \
          --disable-shared \
          --disable-sys-libs \
          --with-gtk=3 \
          --enable-secretstore=no

        make -j$(nproc)
        make install

    - name: Bootstrap Code::Blocks
      run: |
        ACLOCAL_FLAGS="-I ${PWD}/${APPDIR}/share/aclocal" ./bootstrap

    - name: Configure Code::Blocks
      run: |
        export PKG_CONFIG_PATH=${APPDIR}/lib/pkgconfig:$PKG_CONFIG_PATH
        ./configure \
          --with-contrib-plugins=all \
          --with-wx-config=${APPDIR}/bin/wx-config \
          --disable-sys-libs --enable-static-wx \
          --prefix=$PWD/$APPDIR

    - name: Build Code::Blocks
      run: |
        make -j$(nproc)

    - name: Install into AppDir
      run: |
        make install

    - name: Download appimagetool
      run: |
        wget -O appimagetool.AppImage \
          https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage

        chmod +x appimagetool.AppImage

    - name: Prepare AppDir
      run: |
        cat > ${APPDIR}/AppRun << 'EOF'
        #!/bin/sh

        HERE="$(dirname "$(readlink -f "${0}")")"
        export PATH="${HERE}/bin:$PATH"
        export LD_LIBRARY_PATH="${HERE}/lib:${HERE}/lib/codeblocks/wxContribItems:$LD_LIBRARY_PATH"
        export CODEBLOCKS_DATA_DIR="${HERE}"
        exec "${HERE}/bin/codeblocks" "$@"
        EOF

        chmod +x ${APPDIR}/AppRun

    - name: Copy desktop file
      run: |
        cp src/mime/codeblocks.desktop ${APPDIR}/

    - name: Copy icon
      run: |
        cp src/mime/codeblocks.png ${APPDIR}/

    - name: Add app name to env
      run: |
        echo "APPNAME=CodeBlocks-${{ env.APPVERSION }}-x86_64.AppImage" >> $GITHUB_ENV
        echo "APPDIR_TGZ=CodeBlocks-${{ env.APPVERSION }}-x86_64.tgz" >> $GITHUB_ENV

    - name: Fix wx-config
      run: |
        rm -f ${APPDIR}/bin/wx-config
        cat > ${APPDIR}/bin/wx-config << 'EOF'
        #!/bin/sh
        ${APPDIR}/lib/wx/config/gtk3-unicode-static-3.2 --prefix=${APPDIR} "$@"
        EOF

        chmod +x ${APPDIR}/bin/wx-config

    - name: Create dev tarball
      if: env.CREATE_APPDIR_TGZ != 'false'
      run: |
        tar -czf ${APPDIR_TGZ} ${APPDIR}

    - name: Cleanup Appdir
      run: |
        rm -rf ${APPDIR}/share/man
        find ${APPDIR}/lib/ -type f -name *.a -exec truncate -s 0 {} +
        rm -f ${APPDIR}/lib/lib*.la
        rm -f ${APPDIR}/lib/codeblocks/plugins/lib*.la
        rm -f ${APPDIR}/lib/codeblocks/wxContribItems/lib*.la

    - name: Build AppImage
      run: |
        ARCH=x86_64 \
        ./appimagetool.AppImage \
          ${APPDIR} \
          ${APPNAME}

    - name: Upload AppImage
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.APPNAME }}
        path: ${{ env.APPNAME }}
        archive: false

    - name: Upload dev tarball
      if: env.CREATE_APPDIR_TGZ != 'false'
      uses: actions/upload-artifact@v7
      with:
        name: ${{ env.APPDIR_TGZ }}
        path: ${{ env.APPDIR_TGZ }}
        archive: false

